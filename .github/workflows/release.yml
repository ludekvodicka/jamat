name: Release build

# Cross-platform desktop installers (Windows / macOS / Linux) via electron-builder.
# UNSIGNED for now — code signing (certs available) is a later step; see the notes below.
# Triggers on a version tag (vX.Y.Z) or manually (workflow_dispatch). Each OS runner
# builds its own native installer and uploads it as a workflow artifact; on a tag a final
# job attaches all installers to a DRAFT GitHub Release for review before publishing.
#
# Adding signing later:
#   win  — set env CSC_LINK (base64 .pfx) + CSC_KEY_PASSWORD from repo secrets.
#   mac  — set CSC_LINK/CSC_KEY_PASSWORD, drop `identity: null` in package.json build.mac,
#          flip CSC_IDENTITY_AUTO_DISCOVERY to true, add APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
#          APPLE_TEAM_ID for notarization.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # the release job creates/attaches a GitHub Release on tag

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: app-electron
        run: npm ci

      - name: Rebuild native modules for Electron (node-pty)
        working-directory: app-electron
        run: npx electron-rebuild -f -w node-pty

      - name: Build main/preload/renderer (electron-vite)
        working-directory: app-electron
        run: npx electron-vite build

      - name: Bundle menu TUI (esbuild)
        run: node --import tsx scripts/build-menu.ts

      - name: Smoke the menu bundle (usage exit)
        shell: bash
        run: node app-electron/out/menu/menu-tui.cjs && exit 1 || test $? -eq 1

      - name: Package installer (${{ matrix.platform }}, unsigned)
        working-directory: app-electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # don't attempt macOS signing/notarization yet
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: jamat-${{ matrix.platform }}
          path: |
            app-electron/dist/*.exe
            app-electron/dist/*.dmg
            app-electron/dist/*.AppImage
            app-electron/dist/latest*.yml
            app-electron/dist/*.blockmap
          if-no-files-found: warn

  release:
    name: attach installers to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute SHA256 checksums (trust anchor for the unsigned installers)
        working-directory: artifacts
        run: |
          # Hash only the user-facing installers (skip blockmap / latest*.yml auto-update metadata),
          # flattening per-platform subdirs to basenames so `sha256sum -c` works in a download folder.
          find . -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) | sort | while read -r f; do
            printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(basename "$f")"
          done > SHA256SUMS.txt
          echo '----- SHA256SUMS.txt -----'; cat SHA256SUMS.txt

      - name: Assemble release notes (checksums + verify hint)
        run: |
          {
            echo '### Verify your download'
            echo
            echo 'The installers are **unsigned** (Windows SmartScreen warns once: **More info -> Run anyway**).'
            echo 'Check the SHA256 of your file against the list below before running it.'
            echo
            echo '```'
            cat artifacts/SHA256SUMS.txt
            echo '```'
            echo
            echo 'Verify: `sha256sum -c SHA256SUMS.txt` (macOS `shasum -a 256 -c`, Windows `Get-FileHash <file> -Algorithm SHA256`).'
          } > release-notes.md
          cat release-notes.md

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: artifacts/**/*
